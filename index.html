<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Screener Desk</title>
<style>
  /*
    Design concept: "trading desk by day, terminal by night."
    Light = accounting-ledger paper (pale sage-grey stock, greenbar row tinting,
    bronze ticker ink). Dark = CRT terminal glass (ink-navy ground, amber phosphor
    accent with a restrained glow on the headline figures). Same structure, two
    honestly different moods -- not an inverted palette.
  */
  :root {
    --bg: #eef1e9;
    --surface: #ffffff;
    --surface-2: #e5eadd;
    --border: #ccd3c1;
    --text: #202a21;
    --text-dim: #5e6a5c;
    --accent: #9c6b12;
    --accent-soft: #f0e2c1;
    --good: #2f7d4f;
    --good-soft: #dcead9;
    --bad: #ab392c;
    --bad-soft: #f5ddd7;
    --warn: #9c6b12;
    --warn-soft: #f0e2c1;
    --radius: 4px;
    --glow: none;
    --serif: ui-serif, "Iowan Old Style", "Palatino Linotype", "Book Antiqua", Georgia, serif;
    --mono: "SF Mono", "SFMono-Regular", ui-monospace, Menlo, Consolas, monospace;
    --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #12151b;
      --surface: #191d24;
      --surface-2: #20252d;
      --border: #2c333d;
      --text: #e7ebee;
      --text-dim: #8b96a3;
      --accent: #e8a33d;
      --accent-soft: #35291a;
      --good: #4fd68c;
      --good-soft: #12301f;
      --bad: #ff7a6b;
      --bad-soft: #3a1712;
      --warn: #e8a33d;
      --warn-soft: #35291a;
      --glow: 1;
    }
  }
  :root[data-theme="dark"] {
    --bg: #12151b;
    --surface: #191d24;
    --surface-2: #20252d;
    --border: #2c333d;
    --text: #e7ebee;
    --text-dim: #8b96a3;
    --accent: #e8a33d;
    --accent-soft: #35291a;
    --good: #4fd68c;
    --good-soft: #12301f;
    --bad: #ff7a6b;
    --bad-soft: #3a1712;
    --warn: #e8a33d;
    --warn-soft: #35291a;
    --glow: 1;
  }
  :root[data-theme="light"] {
    --bg: #eef1e9;
    --surface: #ffffff;
    --surface-2: #e5eadd;
    --border: #ccd3c1;
    --text: #202a21;
    --text-dim: #5e6a5c;
    --accent: #9c6b12;
    --accent-soft: #f0e2c1;
    --good: #2f7d4f;
    --good-soft: #dcead9;
    --bad: #ab392c;
    --bad-soft: #f5ddd7;
    --warn: #9c6b12;
    --warn-soft: #f0e2c1;
    --glow: none;
  }

  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    line-height: 1.4;
    -webkit-font-smoothing: antialiased;
  }
  .wrap { max-width: 1140px; margin: 0 auto; padding: 32px 20px 60px; }

  .masthead {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 24px;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
  }
  .masthead h1 {
    font-family: var(--serif);
    font-size: 26px;
    font-weight: 600;
    letter-spacing: 0.01em;
    margin: 0;
    text-wrap: balance;
  }
  .masthead h1::before { content: "▲ "; color: var(--accent); font-family: var(--sans); }
  .masthead .subtitle { font-family: var(--sans); font-size: 12.5px; color: var(--text-dim); margin-top: 3px; }
  .masthead .meta { font-family: var(--mono); font-size: 11.5px; color: var(--text-dim); white-space: nowrap; }

  .stat-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(168px, 1fr)); gap: 12px; margin-bottom: 30px; }
  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-top: 3px solid var(--border);
    border-radius: var(--radius);
    padding: 13px 15px;
  }
  .stat-card.good { border-top-color: var(--good); }
  .stat-card.bad { border-top-color: var(--bad); }
  .stat-card .label {
    font-family: var(--sans);
    font-size: 10.5px;
    text-transform: uppercase;
    letter-spacing: 0.09em;
    color: var(--text-dim);
    margin-bottom: 7px;
  }
  .stat-card .value {
    font-family: var(--mono);
    font-size: 23px;
    font-weight: 600;
    font-variant-numeric: tabular-nums;
    letter-spacing: -0.01em;
  }
  .stat-card .value.good { color: var(--good); }
  .stat-card .value.bad { color: var(--bad); }
  @media (prefers-color-scheme: dark) {
    .stat-card .value.good { text-shadow: 0 0 12px rgba(79, 214, 140, 0.35); }
    .stat-card .value.bad { text-shadow: 0 0 12px rgba(255, 122, 107, 0.35); }
  }
  :root[data-theme="dark"] .stat-card .value.good { text-shadow: 0 0 12px rgba(79, 214, 140, 0.35); }
  :root[data-theme="dark"] .stat-card .value.bad { text-shadow: 0 0 12px rgba(255, 122, 107, 0.35); }
  .stat-card .sub { font-family: var(--mono); font-size: 11px; color: var(--text-dim); margin-top: 5px; }

  section { margin-bottom: 32px; }
  section > h2 {
    font-family: var(--serif);
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
    margin: 0 0 12px;
    padding-bottom: 8px;
    border-bottom: 1.5px solid var(--text-dim);
    box-shadow: 0 3px 0 -2px var(--border);
  }

  .table-scroll { overflow-x: auto; border: 1px solid var(--border); border-radius: var(--radius); background: var(--surface); }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th, td { padding: 9px 12px; text-align: left; white-space: nowrap; }
  /* Screener column can hold 2+ chips (a symbol with concurrent positions can pass
     multiple templates) -- let it wrap instead of forcing the whole table wider. */
  tbody tr td:last-child { white-space: normal; }
  th {
    font-family: var(--sans);
    font-size: 10.5px;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    color: var(--text-dim);
    font-weight: 600;
    border-bottom: 1px solid var(--border);
  }
  tbody tr + tr td { border-top: 1px solid var(--border); }
  /* Greenbar ledger stripe: tint every other POSITION (a data row + its history
     row form one pair), not every raw <tr>, so the two-row group reads as one unit. */
  tbody tr:nth-child(4n+1) td, tbody tr:nth-child(4n+2) td { background: var(--surface-2); }
  td.num, th.num { font-family: var(--mono); font-variant-numeric: tabular-nums; text-align: right; }
  td.symbol { font-family: var(--mono); font-weight: 700; }

  .pill {
    display: inline-block;
    font-family: var(--mono);
    font-size: 10.5px;
    font-weight: 700;
    padding: 2px 8px;
    border-radius: 999px;
    letter-spacing: 0.03em;
  }
  .pill.entered { background: var(--good-soft); color: var(--good); }
  .pill.tp1_taken { background: var(--good-soft); color: var(--good); }
  .pill.waiting_correction { background: var(--warn-soft); color: var(--warn); }
  .pill.flat { background: var(--surface-2); color: var(--text-dim); }

  /* TIER SECTION DIVIDER (2026-07-17, user request): a slim labeled rule between
     each position tier (Holding/TP Taken/Trailing Stop Raised/At Original
     Stop/Waiting Correction/Closed) so the grouping reads as distinct sections. */
  tbody tr.tier-row td {
    background: var(--surface-2) !important;
    font-family: var(--sans);
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-dim);
    padding: 6px 12px;
    border-top: 1.5px solid var(--border) !important;
  }

  .history-row td { padding: 4px 12px 12px; border-top: none !important; }
  .history-track { display: flex; flex-wrap: wrap; align-items: center; gap: 4px; white-space: normal; }
  .history-step { display: inline-flex; align-items: baseline; gap: 5px; }
  .history-kind {
    font-family: var(--mono);
    font-size: 9.5px;
    font-weight: 700;
    padding: 2px 7px;
    border-radius: 999px;
    background: var(--surface-2);
    color: var(--text-dim);
    letter-spacing: 0.02em;
  }
  .history-kind.entry { background: var(--good-soft); color: var(--good); }
  .history-kind.tp1, .history-kind.tp2_close { background: var(--good-soft); color: var(--good); }
  .history-kind.stop, .history-kind.waiting_correction_invalidated { background: var(--bad-soft); color: var(--bad); }
  .history-kind.waiting_correction_start { background: var(--warn-soft); color: var(--warn); }
  .history-kind.trailing_stop_raised, .history-kind.tier_assigned { background: var(--accent-soft); color: var(--accent); }
  .history-meta { font-family: var(--mono); font-size: 10px; color: var(--text-dim); }
  .history-arrow { color: var(--text-dim); font-size: 11px; margin: 0 2px; }
  .history-empty { font-family: var(--mono); font-size: 11px; color: var(--text-dim); font-style: italic; }

  .pct.good { color: var(--good); }
  .pct.bad { color: var(--bad); }

  .empty-state {
    padding: 30px 16px;
    text-align: center;
    color: var(--text-dim);
    font-size: 13px;
    background: var(--surface);
    border: 1px dashed var(--border);
    border-radius: var(--radius);
  }

  .bar-row { display: flex; align-items: center; gap: 10px; padding: 6px 0; }
  .bar-row .bar-label { width: 150px; font-family: var(--mono); font-size: 12px; flex-shrink: 0; overflow: hidden; text-overflow: ellipsis; }
  .bar-track { flex: 1; height: 7px; background: var(--surface-2); border-radius: 3px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 3px; }
  .bar-fill.strategy { background: var(--accent); }
  .bar-fill.benchmark { background: var(--text-dim); }
  .bar-row .bar-value { width: 70px; text-align: right; font-family: var(--mono); font-size: 12px; font-variant-numeric: tabular-nums; }

  .screener-group { padding: 10px 0; }
  .screener-group + .screener-group { border-top: 1px solid var(--border); }
  .screener-group .bar-row { padding-bottom: 8px; }
  .ticker-chips { display: flex; flex-wrap: wrap; gap: 6px; padding-left: 160px; }
  .ticker-chip {
    display: inline-block;
    font-family: var(--mono);
    font-size: 10.5px;
    font-weight: 700;
    padding: 3px 9px;
    border-radius: 999px;
    background: var(--surface-2);
    color: var(--text);
    letter-spacing: 0.02em;
    border: 1px solid var(--border);
  }

  .alert-log { display: flex; flex-direction: column; }
  .alert-row {
    display: grid;
    grid-template-columns: 92px 72px 130px 1fr;
    gap: 12px;
    padding: 8px 10px;
    border-top: 1px solid var(--border);
    font-size: 13px;
    align-items: baseline;
  }
  .alert-row:first-child { border-top: none; }
  .alert-row:nth-child(even) { background: var(--surface-2); }
  .alert-row .ts { font-family: var(--mono); font-size: 11px; color: var(--text-dim); }
  .alert-row .symbol { font-family: var(--mono); font-weight: 700; }
  /* "kind" values like WAITING_CORRECTION_START are one long underscore-joined word
     with no space for the browser to wrap at -- without a break hint they overflow
     this fixed-width column and visually sit on top of the message text next to it. */
  .alert-row .kind { overflow-wrap: break-word; word-break: break-word; font-size: 12px; }
  .alert-row .msg { color: var(--text-dim); overflow: hidden; text-overflow: ellipsis; }

  footer {
    margin-top: 44px;
    padding-top: 16px;
    border-top: 1px solid var(--border);
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-dim);
    text-align: center;
  }
</style>
</head>

</div>

<script>
  const data = JSON.parse(document.getElementById("dashboard-data").textContent);

  function fmtPct(x, digits = 1) {
    if (x === null || x === undefined) return "—";
    return (x >= 0 ? "+" : "") + (x * 100).toFixed(digits) + "%";
  }
  function fmtPrice(x) {
    if (x === null || x === undefined) return "—";
    return "$" + x.toFixed(2);
  }
  function pctClass(x) {
    if (x === null || x === undefined) return "";
    return x >= 0 ? "good" : "bad";
  }
  function escapeHtml(s) {
    const div = document.createElement("div");
    div.textContent = s === null || s === undefined ? "" : String(s);
    return div.innerHTML;
  }

  document.getElementById("generated-at").textContent =
    "generated " + new Date(data.generated_at).toLocaleString();

  // --- Stat row ---
  const stats = [];
  // PYRAMIDING (2026-07-15): open_positions is now one row per POSITION, not per
  // symbol -- dedupe symbols for the sub-text so a 2-position DAVE doesn't show twice.
  stats.push({
    label: "Open Positions",
    value: data.open_positions.length,
    sub: data.open_positions.length ? [...new Set(data.open_positions.map(p => p.symbol))].join(", ") : "none right now",
  });
  // OVERALL PERFORMANCE SUMMARY (2026-07-17, user request): "overall position ที่
  // เปิดอยู่ กำไรหรือขาดทุนเท่าไหร่" + "position รวมของที่ปิดไปและเปิดอยู่ตอนนี้
  // performance เป็นยังไง" -- see db/database.py's compute_position_performance_summary()
  // for the blended-pnl methodology (TP1 partial exits accounted for). avg_pnl_pct is
  // the EQUAL-WEIGHTED AVERAGE across positions (2026-07-17, user correction -- was a
  // sum), matching "blended_return" everywhere else in this project -- for the "open"
  // figure specifically this IS the real portfolio's actual blended return right now
  // under the fixed-$-per-entry capital model.
  if (data.performance_summary) {
    const perf = data.performance_summary;
    stats.push({
      label: "Open Positions P&L",
      value: perf.open_count ? fmtPct(perf.open_avg_pnl_pct) : "—",
      valueClass: perf.open_count ? pctClass(perf.open_avg_pnl_pct) : "",
      sub: perf.open_count ? "avg across " + perf.open_count + " open position(s)" : "none open right now",
    });
    // PORTFOLIO 1D CHANGE (2026-07-17, user request): equal-weighted avg of each
    // open position's own 1-day price change -- see reports/dashboard.py's
    // build_dashboard_data() for the averaging methodology.
    stats.push({
      label: "Portfolio 1D Change",
      value: perf.port_day_change_pct != null ? fmtPct(perf.port_day_change_pct) : "—",
      valueClass: perf.port_day_change_pct != null ? pctClass(perf.port_day_change_pct) : "",
      sub: perf.port_day_change_pct != null ? "avg 1D move across open positions" : "no priced positions today",
    });
    stats.push({
      label: "All-Time Performance",
      value: perf.all_time_count ? fmtPct(perf.all_time_avg_pnl_pct) : "—",
      valueClass: perf.all_time_count ? pctClass(perf.all_time_avg_pnl_pct) : "",
      sub: perf.all_time_count ? perf.closed_count + " closed + " + perf.open_count + " open, " + perf.all_time_count + " total" : "no positions tracked yet",
    });
  }
  stats.push({
    label: "Screener Universe",
    value: data.screener.total_symbols,
    sub: data.screener.run_date ? "as of " + data.screener.run_date : "no data yet",
  });
  // PYRAMIDING (2026-07-15): last_backtest now holds BOTH capital modes --
  // "limited" (realistic, single shared account) is the headline stat since it's
  // the conservative/realistic figure; "unlimited" (fixed $ per entry, no shared-cash
  // constraint) is called out alongside it, not hidden -- see backtest/run_backtest.py.
  if (data.last_backtest && data.last_backtest.limited) {
    const limited = data.last_backtest.limited;
    const unlimited = data.last_backtest.unlimited;
    stats.push({
      label: "Last Backtest Return (limited capital)",
      value: fmtPct(limited.blended_return),
      valueClass: pctClass(limited.blended_return),
      sub: limited.universe_size + " symbols, " + data.last_backtest.run_date,
    });
    // 2026-07-16 (user request): win rate / avg win / avg loss surfaced on the main
    // stat row too, not just buried in the detailed backtest section further down.
    if (limited.win_rate != null) {
      stats.push({
        label: "Win Rate",
        value: fmtPct(limited.win_rate, 1),
        sub: "avg win " + fmtPct(limited.avg_win) + " · avg loss " + fmtPct(limited.avg_loss),
      });
    }
    if (unlimited) {
      stats.push({
        label: "Last Backtest Return (unlimited capital)",
        value: fmtPct(unlimited.blended_return),
        valueClass: pctClass(unlimited.blended_return),
        sub: "same universe, fixed $ per entry",
      });
    }
    const bench = data.last_backtest.benchmark_returns || {};
    const beatsAll = Object.values(bench).every(b => limited.blended_return > b);
    stats.push({
      label: "vs. Benchmarks (limited)",
      value: beatsAll ? "Beats all 3" : "Mixed",
      valueClass: beatsAll ? "good" : "",
      sub: Object.entries(bench).map(([k, v]) => k + " " + fmtPct(v, 0)).join(" · "),
    });
  }

  const statRow = document.getElementById("stat-row");
  statRow.innerHTML = stats.map(s => `
    <div class="stat-card ${s.valueClass || ""}">
      <div class="label">${escapeHtml(s.label)}</div>
      <div class="value ${s.valueClass || ""}">${escapeHtml(s.value)}</div>
      <div class="sub">${escapeHtml(s.sub || "")}</div>
    </div>
  `).join("");

  // --- Open + closed positions, grouped by tier ---
  // TIER ORDER (2026-07-17, user request: "แยกตัวที่มี position ไว้บนสุด ลงมาเป็น tp
  // ลงมาเป็น ts ลงมาเป็น sl ลงมาเป็น wait correction และล่างสุดเป็น closed position")
  // -- both lists arrive pre-sorted by tier from reports/dashboard.py (open:
  // tiers 0-4 via classify_position_tier(), closed: fixed tier 5) -- concatenating
  // them here preserves that order. A divider row is inserted whenever the tier
  // changes so the grouping reads as distinct sections, not one long flat list.
  const TIER_SECTION_LABEL = {
    position: "Holding",
    tp: "TP Taken",
    ts: "Trailing Stop Raised",
    sl: "At Original Stop",
    wait_correction: "Waiting Correction",
    closed: "Closed",
  };
  const posTarget = document.getElementById("positions-target");
  const allPositions = [...data.open_positions, ...(data.closed_positions || [])];
  if (!allPositions.length) {
    posTarget.innerHTML = `<div class="empty-state">No positions tracked yet.</div>`;
  } else {
    let lastTier = null;
    const rows = allPositions.map(p => {
      const isClosed = p.tier_label === "closed";
      let sectionRow = "";
      if (p.tier !== lastTier) {
        lastTier = p.tier;
        sectionRow = `<tr class="tier-row"><td colspan="11">${escapeHtml(TIER_SECTION_LABEL[p.tier_label] || p.tier_label)}</td></tr>`;
      }
      if (isClosed) {
        const emoji = p.exit_kind === "TP2_CLOSE" ? "🎯" : "🛑";
        const label = p.exit_kind === "TP2_CLOSE" ? "Closed (TP2)" : "Closed (SL)";
        return `
          ${sectionRow}
          <tr>
            <td class="symbol">${escapeHtml(p.symbol)}${p.position_id != null ? ` <span class="history-meta">#${p.position_id}</span>` : ""}</td>
            <td><span class="pill flat">${emoji} ${escapeHtml(label)}</span></td>
            <td class="num">${fmtPrice(p.entry_price)}</td>
            <td class="num">${fmtPrice(p.exit_price)}</td>
            <td class="num">&mdash;</td>
            <td class="num pct ${pctClass(p.realized_pct)}">${fmtPct(p.realized_pct)}</td>
            <td class="num">&mdash;</td><td class="num">&mdash;</td><td class="num">&mdash;</td><td class="num">&mdash;</td>
            <td><span class="history-meta">${escapeHtml((p.exit_date || "").slice(0, 10))}</span></td>
          </tr>
          <tr class="history-row"><td colspan="11"></td></tr>
        `;
      }
      const stateClass = p.state.toLowerCase();
      const history = (p.history || []).map(h => `
        <span class="history-step">
          <span class="history-kind ${h.kind.toLowerCase()}">${escapeHtml(h.kind)}</span>
          <span class="history-meta">${escapeHtml((h.ts || "").slice(0, 10))}${h.price != null ? " @ " + fmtPrice(h.price) : ""}</span>
        </span>
      `).join(`<span class="history-arrow">&rarr;</span>`);
      return `
        ${sectionRow}
        <tr>
          <td class="symbol">${escapeHtml(p.symbol)}${p.position_id != null ? ` <span class="history-meta">#${p.position_id}</span>` : ""}</td>
          <td><span class="pill ${stateClass}">${escapeHtml(p.state)}</span></td>
          <td class="num">${fmtPrice(p.entry_price)}</td>
          <td class="num">${fmtPrice(p.current_price)}</td>
          <td class="num pct ${pctClass(p.day_change_pct)}">${fmtPct(p.day_change_pct)}</td>
          <td class="num pct ${pctClass(p.unrealized_pct)}">${fmtPct(p.unrealized_pct)}</td>
          <td class="num">${p.poc_tier ? "Tier " + p.poc_tier : "pending"}</td>
          <td class="num">${fmtPrice(p.tp1_price)}</td>
          <td class="num">${fmtPrice(p.tp2_price)}</td>
          <td class="num">${fmtPrice(p.sl_price)}</td>
          <td>${(p.screener_templates || []).length
            ? p.screener_templates.map(t => `<span class="ticker-chip">${escapeHtml(t)}</span>`).join(" ")
            : `<span class="history-empty">not in today's screen</span>`}</td>
        </tr>
        <tr class="history-row">
          <td colspan="11">
            ${history ? `<div class="history-track">${history}</div>` : `<span class="history-empty">no logged events yet</span>`}
          </td>
        </tr>
      `;
    }).join("");
    posTarget.innerHTML = `
      <div class="table-scroll">
        <table>
          <thead>
            <tr>
              <th>Symbol</th><th>State</th>
              <th class="num">Entry</th><th class="num">Now</th><th class="num">1D Chg</th><th class="num">P&amp;L</th>
              <th class="num">TP Tier</th><th class="num">TP1</th><th class="num">TP2</th><th class="num">SL</th>
              <th>Screener</th>
            </tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
    `;
  }

  // --- Screener universe ---
  const screenerTarget = document.getElementById("screener-target");
  if (!data.screener.run_date) {
    screenerTarget.innerHTML = `<div class="empty-state">No screener runs recorded yet.</div>`;
  } else {
    const maxCount = Math.max(...data.screener.by_template.map(t => t.count), 1);
    const groups = data.screener.by_template.map(t => {
      const chips = (t.symbols || []).map(s => `<span class="ticker-chip">${escapeHtml(s)}</span>`).join("");
      return `
      <div class="screener-group">
        <div class="bar-row">
          <div class="bar-label">${escapeHtml(t.template)}</div>
          <div class="bar-track"><div class="bar-fill strategy" style="width:${(t.count / maxCount * 100).toFixed(0)}%"></div></div>
          <div class="bar-value">${t.count}</div>
        </div>
        <div class="ticker-chips">${chips}</div>
      </div>
    `;
    }).join("");
    screenerTarget.innerHTML = `<div class="table-scroll" style="padding:14px 16px;">${groups}</div>`;
  }

  // --- Last backtest --- (PYRAMIDING, 2026-07-15: BOTH capital modes shown, one
  // section each, sharing the benchmark bars -- see backtest/run_backtest.py's
  // CAPITAL MODES docstring for why both are reported rather than picking one)
  const backtestTarget = document.getElementById("backtest-target");
  const btData = data.last_backtest;
  if (!btData || !btData.limited) {
    document.getElementById("backtest-section").style.display = "none";
  } else {
    const benchBars = Object.entries(btData.benchmark_returns || {}).map(([name, ret]) => `
      <div class="bar-row">
        <div class="bar-label">${escapeHtml(name)}</div>
        <div class="bar-track"><div class="bar-fill benchmark" style="width:${Math.min(Math.abs(ret) / 2, 1) * 100}%"></div></div>
        <div class="bar-value pct ${pctClass(ret)}">${fmtPct(ret)}</div>
      </div>
    `).join("");
    const modeSection = (label, bt) => bt ? `
      <div class="screener-group">
        <div class="bar-row">
          <div class="bar-label">${escapeHtml(label)}</div>
          <div class="bar-track"><div class="bar-fill strategy" style="width:${Math.min(Math.abs(bt.blended_return) / 2, 1) * 100}%"></div></div>
          <div class="bar-value pct ${pctClass(bt.blended_return)}">${fmtPct(bt.blended_return)}</div>
        </div>
        <div style="padding-top:6px; font-family:var(--mono); font-size:12px; color:var(--text-dim);">
          ${bt.total_entries} entries · ${bt.total_tp1} TP1 · ${bt.total_tp2} TP2 · ${bt.total_stops} stops ·
          win rate ${fmtPct(bt.win_rate, 1)} · avg win ${fmtPct(bt.avg_win)} · avg loss ${fmtPct(bt.avg_loss)}
          ${bt.avg_max_drawdown != null ? ` · avg max drawdown ${fmtPct(bt.avg_max_drawdown, 1)} (worst ${fmtPct(bt.worst_max_drawdown, 1)})` : ""}
          ${bt.max_concurrent_positions != null ? ` · concurrent positions: max ${bt.max_concurrent_positions}, min ${bt.min_concurrent_positions}` : ""}
        </div>
      </div>
    ` : "";
    backtestTarget.innerHTML = `
      <div class="table-scroll" style="padding:14px 16px;">
        ${modeSection("Strategy (limited capital, $10k/symbol)", btData.limited)}
        ${modeSection("Strategy (unlimited capital, fixed $ per entry)", btData.unlimited)}
        <div class="screener-group">
          <div class="bar-label" style="padding-bottom:4px;">Benchmarks</div>
          ${benchBars}
        </div>
      </div>
    `;
  }

  // --- Recent alerts ---
  const alertsTarget = document.getElementById("alerts-target");
  if (!data.recent_alerts.length) {
    alertsTarget.innerHTML = `<div class="empty-state">No alerts logged yet.</div>`;
  } else {
    const rows = data.recent_alerts.map(a => `
      <div class="alert-row">
        <div class="ts">${escapeHtml(a.ts)}</div>
        <div class="symbol">${escapeHtml(a.symbol)}</div>
        <div class="kind">${escapeHtml(a.kind)}</div>
        <div class="msg">${escapeHtml(a.message)}</div>
      </div>
    `).join("");
    alertsTarget.innerHTML = `<div class="table-scroll" style="padding:4px 16px;">${rows}</div>`;
  }
</script>
</body>
</html>
